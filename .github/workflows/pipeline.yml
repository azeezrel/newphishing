name: CI Build & Security Pipeline

# The pipeline triggers on pushes or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # STAGE 1: Security & Vulnerability Scanning
  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Scan for Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit Dependencies
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi

  # STAGE 2: Code Quality (Linting)
  lint:
    name: Code Quality Check
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint with Flake8
        run: |
          pip install flake8
          # Fails if there are logic errors or syntax issues
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # STAGE 3: Build Verification
  build:
    name: Automated Build
    needs: lint
    runs-on: ubuntu-latest
    # Map your repository secrets to environment variables here
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      API_KEY: ${{ secrets.API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Build
        run: |
          echo "Finalizing build for Phishing Email Detection App..."
          # This is where you run any final scripts to ensure the ML environment is ready
          # Example: python verify_setup.py